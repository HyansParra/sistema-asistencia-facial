<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - Registro de Personal</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="tarjeta-asistencia">

        <div style="text-align: left; width: 100%; margin-bottom: 10px;">
            <a href="/estaticos/index.html" style="font-size: 13px; color: #0066cc; text-decoration: none; font-weight: bold;">Volver a Control de Asistencia</a>
        </div>

        <h1>Enrolamiento de Personal</h1>
        <p class="subtitulo">Complete los datos y siga las instrucciones de la pantalla</p>

        <div style="margin-bottom: 20px; text-align: left;">
            <label style="font-weight: bold; font-size: 14px; color: #333;">RUT del Empleado:</label>
            <input type="text" id="campo-rut" placeholder="Ej: 12345678-9" style="width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
            
            <label style="font-weight: bold; font-size: 14px; color: #333;">Nombre Completo:</label>
            <input type="text" id="campo-nombre" placeholder="Ej: Juan Pérez" style="width: 100%; padding: 10px; margin: 8px 0 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
        </div>

        <div class="contenedor-camara">
            <video id="video-registro" autoplay playsinline muted></video>
            <div class="recuadro-rostro"></div>
            <div id="contador-oval"></div>
        </div>

        <div class="bloque-notificaciones">
            <div id="estado-registro">Por favor, ingrese el RUT y nombre para comenzar...</div>
        </div>

        <button id="btn-captura" class="boton boton-verde" style="width: 100%;" onclick="iniciarCapturaBiometrica()">
            Iniciar Capturas
        </button>
    </div>

    <script>
        // Referencias a elementos del DOM para control de flujo y actualización de UI
        const video = document.getElementById('video-registro');
        const componenteEstado = document.getElementById('estado-registro');
        const botonCaptura = document.getElementById('btn-captura');
        const contadorEnOval = document.getElementById('contador-oval');
        const campoRut = document.getElementById('campo-rut');
        const campoNombre = document.getElementById('campo-nombre');

        // Define las instrucciones para cada una de las 5 perspectivas que el administrador debe capturar
        const instrucciones = [
            "Mire fijamente de FRENTE",
            "Gire levemente la cabeza a la IZQUIERDA",
            "Gire levemente la cabeza a la DERECHA",
            "Incline levemente la cabeza hacia ARRIBA",
            "Incline levemente la cabeza hacia ABAJO"
        ];

        let pasoActual = -1; // Controla la fase actual del proceso de captura desde -1 que es antes de iniciar, hasta 4 que es la última foto
        let fotosElegidas = [];

        // Activa la webcam y muestra el video en vivo
        async function encenderWebcam() {
            try {
                const flujo = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = flujo;
            } catch (err) {
                console.error(err);
                componenteEstado.innerText = "No se pudo acceder a la cámara";
            }
        }

        // Función principal que maneja el proceso de captura biométrica en fases, guiando al administrador paso a paso
        async function iniciarCapturaBiometrica() {
            const rut = campoRut.value.trim();
            const nombre = campoNombre.value.trim();

            // Valida que el administrador haya ingresado ambos campos antes de iniciar el proceso
            if (!rut || !nombre) {
                componenteEstado.innerText = "Debe ingresar el RUT y el Nombre antes de capturar";
                componenteEstado.style.color = "#cb2431";
                return;
            }

            // Fase de inicio del proceso: Configura el entorno para la captura de fotos y guía al usuario al primer paso
            if (pasoActual === -1) {
                // bloquea el imput para que el rut y nombre no se puedan modificar durante el proceso de captura
                campoRut.disabled = true;
                campoNombre.disabled = true;
                fotosElegidas = [];
                pasoActual = 0;

                // actualiza la interfaz para mostrar la primera instrucción y preparar al usuario para la captura manual de la primera foto
                componenteEstado.innerText = `Posición 1/5: ${instrucciones[pasoActual]}. Acomódese y presione el botón.`;
                componenteEstado.style.color = "#0066cc";
                contadorEnOval.innerText = "1";
                botonCaptura.innerText = "Tomar Foto (1/5)";
                return;
            }

            // fase de captura manual: cada vez que el usuario presiona el botón
            // realiza un efecto de flash para simular la captura de la foto
            video.classList.add('camara-flash');
            setTimeout(() => {
                video.classList.remove('camara-flash');
            }, 350);

            // creamos un lienzo temporal para capturar el fotograma actual del video y convertirlo en una imagen
            const lienzo = document.createElement('canvas');
            lienzo.width = video.videoWidth;
            lienzo.height = video.videoHeight;
            const contexto = lienzo.getContext('2d');
            contexto.drawImage(video, 0, 0, lienzo.width, lienzo.height);

            // convertimos el lienzo a un blob de imagen JPEG y lo almacenamos en el array de fotos elegidas para su posterior envío al servidor
            await new Promise((resolve) => {
                lienzo.toBlob((blob) => {
                    if (blob) fotosElegidas.push(blob);
                    resolve();
                }, 'image/jpeg', 0.9);
            });

            // incrementamos el paso actual para avanzar a la siguiente instrucción o finalizar el proceso si ya se capturaron las 5 fotos
            pasoActual++;

            if (pasoActual < instrucciones.length) {
                // Si quedan ángulos pendientes, actualiza la guía y espera el clic del usuario
                componenteEstado.innerText = `Posición ${pasoActual + 1}/5: ${instrucciones[pasoActual]}. Presione para capturar.`;
                contadorEnOval.innerText = pasoActual + 1;
                botonCaptura.innerText = `Tomar Foto (${pasoActual + 1}/5)`;
            } else {
                // Si ya capturó las 5 fotos, procesa el envío masivo
                await enviarRáfagaAlServidor(rut, nombre);
            }
        }

        // Envía el formulario final acumulado al backend de FastAPI
        async function enviarRáfagaAlServidor(rut, nombre) {
            botonCaptura.disabled = true;
            contadorEnOval.innerText = "";
            componenteEstado.innerText = "Procesando y empaquetando ráfaga de imágenes...";
            componenteEstado.style.color = "#0066cc";

            const formulario = new FormData();
            formulario.append('rut', rut);
            formulario.append('nombre_completo', nombre);
            
            fotosElegidas.forEach((fotoBlob, indice) => {
                formulario.append('fotos', fotoBlob, `angulo_${indice}.jpg`);
            });

            try {
                componenteEstado.innerText = "Guardando credenciales en la base de datos...";
                
                const respuesta = await fetch('/registrar', {
                    method: 'POST',
                    body: formulario
                });

                const resultado = await respuesta.json();

                if (respuesta.ok && resultado.estado === "exito") {
                    componenteEstado.innerText = `OK - ${resultado.mensaje}`;
                    componenteEstado.style.color = "#2ea44f";
                    
                    // Limpiamos el formulario si todo salió bien
                    campoRut.value = "";
                    campoNombre.value = "";
                } else {
                    componenteEstado.innerText = `Error - ${resultado.detalle || 'No se pudo registrar'}`;
                    componenteEstado.style.color = "#cb2431";
                }
            } catch (error) {
                console.error(error);
                componenteEstado.innerText = "Error crítico de red con el servidor";
                componenteEstado.style.color = "#cb2431";
            } finally {
                // Restablecemos las variables de control globales para el siguiente empleado
                pasoActual = -1;
                fotosElegidas = [];
                campoRut.disabled = false;
                campoNombre.disabled = false;
                botonCaptura.disabled = false;
                botonCaptura.innerText = "Iniciar Capturas";
            }
        }

        // Inicia la webcam al cargar la página para que el video esté listo cuando el usuario comience el proceso de captura
        encenderWebcam();
    </script>
