<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - Registro Facial</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="tarjeta-asistencia">

        <div style="text-align: right; width: 100%; margin-bottom: 10px;">
            <a href="/estaticos/login.html" style="font-size: 13px; color: #0066cc; text-decoration: none; font-weight: bold;">Registrar nuevo empleado</a>
        </div>
        
        <h1>Control de Asistencia</h1>
        <p class="subtitulo">Por favor, mire a la cámara para registrar su marca</p>

        <div class="contenedor-camara">
            <video id="video-webcam" autoplay playsinline muted></video>
            <div class="recuadro-rostro"></div>
        </div>

        <div class="bloque-notificaciones">
            <div id="reloj-digital">Fecha y Hora: Cargando...</div>
            <div id="mensaje-servidor">Esperando Registro...</div>
        </div>

        <div class="grupo-botones">
            <button id="btn-entrada" class="boton boton-verde" onclick="procesarMarcaje('ENTRADA')">
                Registrar Entrada
            </button>
            <button id="btn-salida" class="boton boton-rojo" onclick="procesarMarcaje('SALIDA')">
                Registrar Salida
            </button>
        </div>

    </div>

    <script>
        const elementoVideo = document.getElementById('video-webcam');
        const elementoReloj = document.getElementById('reloj-digital');
        const elementoMensaje = document.getElementById('mensaje-servidor');

        async function iniciarCamara() {
            try {
                const flujoVideo = await navigator.mediaDevices.getUserMedia({ video: true });
                elementoVideo.srcObject = flujoVideo;
            } catch (error) {
                console.error("Error en la cámara:", error);
                elementoMensaje.innerText = "Error al conectar la cámara web";
                elementoMensaje.style.color = "#FF0000";
                elementoMensaje.style.fontWeight = "700";
            }
        }

        function actualizarReloj() {
            const momentoActual = new Date();
            
            const opcionesFormato = {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            };
            
            elementoReloj.innerText = `Fecha y Hora: ${momentoActual.toLocaleString('es-CL', opcionesFormato)}`;
        }

        async function procesarMarcaje(tipoRegistro) {
            elementoMensaje.innerText = `Capturando rostro para ${tipoRegistro}...`;
            elementoMensaje.style.color = "#0066cc";

            // Contexto gráfico temporal para el aislamiento del fotograma actual
            const lienzo = document.createElement('canvas');
            lienzo.width = elementoVideo.videoWidth;
            lienzo.height = elementoVideo.videoHeight;
            
            const contexto = lienzo.getContext('2d');
            contexto.drawImage(elementoVideo, 0, 0, lienzo.width, lienzo.height);

            // Transmisión asíncrona del fotograma en formato binario comprimido
            lienzo.toBlob(async (blob) => {
                if (!blob) {
                    elementoMensaje.innerText = "Error al capturar la foto de la cámara";
                    elementoMensaje.style.color = "#FF0000";
                    elementoMensaje.style.fontWeight = "700";
                    return;
                }

                const formulario = new FormData();
                formulario.append('foto', blob, 'captura.jpg');
                formulario.append('tipo_registro', tipoRegistro);

                try {
                    elementoMensaje.innerText = "Enviando datos al servidor...";
                    
                    const respuesta = await fetch('/marcar', {
                        method: 'POST',
                        body: formulario
                    });

                    const datos = await respuesta.json();
                    
                    if (respuesta.ok) {
                        elementoMensaje.innerText = `Estado: ${datos.mensaje}`;
                        elementoMensaje.style.color = "#2ea44f";
                        elementoMensaje.style.fontWeight = "700";
                    } else {
                        elementoMensaje.innerText = `Error - ${datos.detalle || 'No se pudo procesar'}`;
                        elementoMensaje.style.color = "#FF0000";
                        elementoMensaje.style.fontWeight = "700";
                    }

                } catch (error) {
                    console.error("Error en la petición:", error);
                    elementoMensaje.innerText = "Sin conexión con el servidor";
                    elementoMensaje.style.color = "#FF0000";
                    elementoMensaje.style.fontWeight = "700";
                }
            }, 'image/jpeg', 0.9);
        }

        iniciarCamara();
        setInterval(actualizarReloj, 1000);
    </script>
</body>
</html>
